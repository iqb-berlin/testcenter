build-backend:
  stage: build
  rules:
    - if: '$PIPELINE_TYPE == "web"'
      when: on_success
    - when: never
  variables:
    BACKEND_IMAGE_NAME: "${CI_REGISTRY_IMAGE}/iqbberlin/testcenter-backend"
  before_script:
    - !reference [ .docker_login, before_script ]
  script:
    - docker build --progress plain --pull --target dev --file backend/Dockerfile
      --tag ${BACKEND_IMAGE_NAME}:${CI_COMMIT_SHA}_dev .
    - docker push ${BACKEND_IMAGE_NAME}:${CI_COMMIT_SHA}_dev
  after_script:
    - !reference [ .docker_login, after_script ]

