build-backend:
  stage: build
  rules:
    - if: '$PIPELINE_TYPE == "web"'
      when: on_success
    - when: never
  variables:
    IMAGE_NAME: "${GITLAB_REGISTRY_IMAGE_BASE}/${BACKEND_IMAGE_NAME}"
  before_script:
    - !reference [ .gitlab_login, before_script ]
  script:
    - docker build --progress plain --pull
      --build-arg REGISTRY_PATH=${DEP_PROXY_PREFIX}/
      --build-arg BUILDKIT_INLINE_CACHE=1
      --cache-from ${IMAGE_NAME}:dev      
      --target dev --file backend/Dockerfile
      --tag ${IMAGE_NAME}:${CI_COMMIT_SHA}_dev
      --tag ${IMAGE_NAME}:dev
      .
    - docker push --all-tags ${IMAGE_NAME}
  after_script:
    - !reference [ .gitlab_login, after_script ]

build-backend-prod:
  stage: build
  rules:
     - if: '$PIPELINE_TYPE == "pre-release"'
       when: on_success
     - if: '$PIPELINE_TYPE == "release"'
       when: on_success
     - when: never
  variables:
    TAG: "${GITLAB_REGISTRY_IMAGE_BASE}/${BACKEND_IMAGE_NAME}:${CI_COMMIT_SHA}"
  before_script:
    - !reference [ .gitlab_login, before_script ]
  script:
    - docker build --progress plain --pull
      --file backend/Dockerfile
      --tag ${TAG} .
    - docker push --quiet ${TAG}
  after_script:
    - !reference [ .gitlab_login, after_script ]

