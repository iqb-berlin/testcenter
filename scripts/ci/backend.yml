##TODO xdebug off for speed? -dxdebug.mode=off
test-backend-unit:
  stage: test
  rules:
    - if: '$PIPELINE_TYPE == "pr"'
      when: on_success
    - if: '$PIPELINE_TYPE == "web"'
      when: on_success
    - when: never
  before_script:
    - !reference [ .gitlab_login, before_script ]
  script:
    - docker compose
      --env-file .env.dev-template
      --file docker-compose.yml
      --file docker-compose.dev.yml
      run --rm --entrypoint "" backend
      php -dxdebug.mode='coverage' /var/www/testcenter/backend/vendor/phpunit/phpunit/phpunit
      --bootstrap /var/www/testcenter/backend/test/unit/bootstrap.php
      --configuration /var/www/testcenter/backend/phpunit.xml
      --coverage-html /docs/dist/test-coverage-backend-unit /var/www/testcenter/backend/test/unit/
      --testdox;
  after_script:
    - !reference [ .gitlab_login, after_script ]
  artifacts:
    paths:
      - docs/dist/test-coverage-backend-unit/*
    expire_in: 30 minutes

test-backend-initialization:
  stage: test
  rules:
    - if: '$PIPELINE_TYPE == "pr"'
      when: on_success
    - if: '$PIPELINE_TYPE == "web"'
      when: on_success
    - when: never
  needs:
    - build-backend
#  variables:
#    BACKEND_IMAGE_NAME: "${GITLAB_REGISTRY_IMAGE_BASE}/${BACKEND_IMAGE_NAME}"
  before_script:
    - !reference [ .gitlab_login, before_script ]
  script:
    - TEST_NAME=general/db-versions
      docker compose
      --env-file .env.dev-template
      --file backend/test/initialization/docker-compose.initialization-test.yml
      up
      --force-recreate
      --renew-anon-volumes
      --abort-on-container-exit
      --exit-code-from=initialization-test-backend
    - TEST_NAME=general/vanilla-installation
      docker compose
      --env-file .env.dev-template
      --file backend/test/initialization/docker-compose.initialization-test.yml
      up
      --force-recreate
      --renew-anon-volumes
      --abort-on-container-exit
      --exit-code-from=initialization-test-backend
    - TEST_NAME=general/no-db-but-files
      docker compose
      --env-file .env.dev-template
      --file backend/test/initialization/docker-compose.initialization-test.yml
      up
      --force-recreate
      --renew-anon-volumes
      --abort-on-container-exit
      --exit-code-from=initialization-test-backend
    - TEST_NAME=general/install-db-patches
      docker compose
      --env-file .env.dev-template
      --file backend/test/initialization/docker-compose.initialization-test.yml
      up
      --force-recreate
      --renew-anon-volumes
      --abort-on-container-exit
      --exit-code-from=initialization-test-backend
    - TEST_NAME=general/re-initialize
      docker compose
      --env-file .env.dev-template
      --file backend/test/initialization/docker-compose.initialization-test.yml
      up
      --force-recreate
      --renew-anon-volumes
      --abort-on-container-exit
      --exit-code-from=initialization-test-backend
  after_script:
    - !reference [ .gitlab_login, after_script ]

test-backend-api:
  stage: test
  rules:
    - if: '$PIPELINE_TYPE == "pr"'
      when: on_success
    - if: '$PIPELINE_TYPE == "web"'
      when: on_success
    - when: never
  needs:
    - build-backend
  variables:
    TAG: "${GITLAB_REGISTRY_IMAGE_BASE}/${BACKEND_IMAGE_NAME}:${CI_COMMIT_SHA}_dev"
  before_script:
    - !reference [ .gitlab_login, before_script ]
    - docker pull --quiet ${TAG}
    - docker tag ${TAG} ${BACKEND_IMAGE_NAME}:current
  script:
    - docker compose
      --env-file .env.dev-template
      --file docker-compose.yml
      --file docker-compose.dev.yml
      --file test/docker-compose.api-test.yml
      run --rm task-runner-backend npm run backend:api-test
  after_script:
    - !reference [ .gitlab_login, after_script ]

test-file-server-api:
  stage: test
  rules:
    - if: '$PIPELINE_TYPE == "pr"'
      when: on_success
    - if: '$PIPELINE_TYPE == "web"'
      when: on_success
    - when: never
  needs:
    - build-backend
    - build-file-server
  variables:
    BACKEND_TAG: "${GITLAB_REGISTRY_IMAGE_BASE}/${BACKEND_IMAGE_NAME}:${CI_COMMIT_SHA}_dev"
    FILE_SERVER_TAG: "${GITLAB_REGISTRY_IMAGE_BASE}/${FILE_SERVER_IMAGE_NAME}:${CI_COMMIT_SHA}_dev"
  before_script:
    - !reference [ .gitlab_login, before_script ]
    - chmod 0755 scripts/database/000-create-test-db.sh
    - docker pull --quiet ${BACKEND_TAG}
    - docker pull --quiet ${FILE_SERVER_TAG}
    - docker tag ${BACKEND_TAG} ${GITLAB_REGISTRY_IMAGE_BASE}/${BACKEND_IMAGE_NAME}:current
    - docker tag ${FILE_SERVER_TAG} ${GITLAB_REGISTRY_IMAGE_BASE}/${BACKEND_IMAGE_NAME}:current
  script:
    - docker compose
      --env-file .env.dev-template
      --file docker-compose.yml
      --file docker-compose.dev.yml
      --file test/docker-compose.api-test.yml
      run --rm task-runner-file-server npm run file-server:api-test
  after_script:
    - !reference [ .gitlab_login, after_script ]

test-broadcaster-unit:
  stage: test
  rules:
    - if: '$PIPELINE_TYPE == "pr"'
      when: on_success
    - if: '$PIPELINE_TYPE == "web"'
      when: on_success
    - when: never
  image: node:22
  script:
    - cd broadcaster
    - npm ci
    - npx jest --coverage