build-file-server:
  stage: build
  rules:
    - if: '$PIPELINE_TYPE == "release"'
      when: on_success
    - when: never # only run when a rule matches
  variables:
    FILE_SERVER_IMAGE_NAME: "${CI_REGISTRY_IMAGE}/iqbberlin/testcenter-file-server"
  before_script:
    - *docker_login
  script:
    - docker build --progress plain --pull --file file-server/Dockerfile
      --tag ${FILE_SERVER_IMAGE_NAME}:${CI_COMMIT_SHA}_dev .
    - docker push ${FILE_SERVER_IMAGE_NAME}:${CI_COMMIT_SHA}_dev
  after_script:
    - *docker_logout

