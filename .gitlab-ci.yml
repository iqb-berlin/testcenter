stages:
  - build
  - test

image: docker:28.2
services:
  - name: docker:28.2-dind

variables:
  DOCKER_TLS_CERTDIR: ''
  DOCKER_DRIVER: overlay2

.docker_login: &docker_login
  - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
.docker_logout: &docker_logout
  - docker logout "$CI_REGISTRY"

build-backend:
  stage: build
  variables:
    BACKEND_IMAGE_NAME: "${CI_REGISTRY_IMAGE}/iqbberlin/testcenter-backend"
  before_script:
    - *docker_login
  script:
    - docker build --progress plain --pull --target dev --file backend/Dockerfile
      --tag ${BACKEND_IMAGE_NAME}:${CI_COMMIT_SHA}_dev .
    - docker push ${BACKEND_IMAGE_NAME}:${CI_COMMIT_SHA}_dev
  after_script:
    - *docker_logout

