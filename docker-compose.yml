# Base compose file defining services and their settings
# For concrete images check the environment specific override files.

x-restart-policy: &restart-policy
  restart: "${RESTART_POLICY:-always}"

x-env-redis: &env-redis
  REDIS_HOST: cache-server
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_CACHE_FILES: ${REDIS_CACHE_FILES:-false}

x-env-mysql: &env-mysql
  MYSQL_DATABASE: ${MYSQL_DATABASE}
  MYSQL_USER: ${MYSQL_USER}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD}

# Object storage (S3-compatible). Endpoint-agnostic: point the S3_* vars in .env
# at any S3 service — an external one such as AWS, STACKIT or MinIO 
# When STORAGE_DRIVER=filesystem (default) these are unused
x-env-objectstore: &env-objectstore
  STORAGE_DRIVER: ${STORAGE_DRIVER:-filesystem}
  S3_ENDPOINT: ${S3_ENDPOINT:-}
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-tc-files}
  S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
  S3_USE_SSL: ${S3_USE_SSL:-false}
  S3_PRESIGN_TTL: ${S3_PRESIGN_TTL:-3600}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-}

x-env-logging-conf: &env-logging-conf
  max-size: "200m"
  max-file: "10"

services:
  traefik:
    image: ${DOCKERHUB_PROXY}traefik:v3.6
    <<: *restart-policy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      testcenter:

  broadcaster:
    image: iqbberlin/testcenter-broadcaster:current
    <<: *restart-policy
    logging:
      options:
        <<: *env-logging-conf
    networks:
      testcenter:

  frontend:
    image: iqbberlin/testcenter-frontend:current
    <<: *restart-policy
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Allowlisted in the prod frontend nginx CSP so the browser may follow
      # presigned-URL redirects to the object store. Empty when disabled.
      OBJECT_STORE_CSP_ORIGIN: ${OBJECT_STORE_CSP_ORIGIN:-}
    logging:
      options:
        <<: *env-logging-conf
    networks:
      testcenter:

  file-server:
    image: iqbberlin/testcenter-file-server:current
    <<: *restart-policy
    depends_on:
      - cache-server
    environment:
      <<: *env-redis
      # On the object-store path the file-server redirects to presigned URLs
      # minted by the backend instead of serving from the data volume.
      OBJECT_STORE_ENABLED: ${OBJECT_STORE_ENABLED:-false}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
    volumes_from:
      - backend:ro
    networks:
      testcenter:

  backend:
    image: iqbberlin/testcenter-backend:current
    <<: *restart-policy
    depends_on:
      db:
        condition: service_healthy
      cache-server:
        condition: service_started
    environment:
      BROADCASTER_ENABLED: ${BROADCASTER_ENABLED}
      FILE_SERVER_ENABLED: ${FILE_SERVER_ENABLED}
      <<: [ *env-redis, *env-mysql, *env-objectstore ]
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      PASSWORD_SALT: ${PASSWORD_SALT}
    logging:
      options:
        <<: *env-logging-conf
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://backend:8080/version" ]
      start_period: 600s
      start_interval: 5s
      interval: 90s
      timeout: 30s
      retries: 3
    volumes:
      - backend_vol:/var/www/testcenter/data
      - /var/www/testcenter/data/.schemas
    networks:
      testcenter:

  cache-server:
    image: ${DOCKERHUB_PROXY}redis:8.0-bookworm
    <<: *restart-policy
    user: redis
    command: [
      "redis-server",
      "--requirepass", "${REDIS_PASSWORD}",
      "--maxmemory", "${REDIS_MEMORY_MAX:-1gb}",
      "--maxmemory-policy", "volatile-lru",
      "--save", '""',
      "--appendonly", "no"
    ]
    networks:
      testcenter:

  db:
    image: ${DOCKERHUB_PROXY}mysql:8.4
    <<: *restart-policy
    environment:
      <<: *env-mysql
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_INITDB_SKIP_TZINFO: 'true'
    volumes:
      - db_vol:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "--user", "${MYSQL_USER}", "-h", "127.0.0.1", "--silent" ]
      start_period: 120s
      start_interval: 5s
      interval: 90s
      timeout: 30s
      retries: 3
    networks:
      testcenter:

volumes:
  db_vol:
  backend_vol:

networks:
  testcenter:
    name: testcenter
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: ${DOCKER_DAEMON_MTU:-1500}
