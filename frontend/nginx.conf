error_log /dev/stdout;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
  listen 8080;
  listen [::]:8080;
  server_name localhost;
  server_tokens off;

  access_log /dev/null;

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
  }

  location /index.html {
    root /usr/share/nginx/html;

    add_header Cache-Control no-store;
    expires 0;

    # ${OBJECT_STORE_CSP_ORIGIN} is substituted by envsubst at container start
    # (this file is installed as /etc/nginx/templates/default.conf.template).
    # On the object-store read path the browser fetches resources via a 302 to a
    # presigned URL on the object-store host, so that origin must be allowlisted.
    # It is empty (no effect) when object storage is disabled.
    # ${OBJECT_STORE_CSP_ORIGIN} is the single object-store origin (or empty when
    # object storage is disabled). It is added to every fetch directive so the
    # browser can load any resource type the read-path-B 302 redirects there,
    # without enumerating asset types. It is one trusted host, not a wildcard.
    set $CSP "";
    set $CSP "${CSP} frame-ancestors 'none';";
    set $CSP "${CSP} frame-src 'self' ${OBJECT_STORE_CSP_ORIGIN};";
    set $CSP "${CSP} default-src 'self' data: ${OBJECT_STORE_CSP_ORIGIN};";
    set $CSP "${CSP} child-src 'self' 'unsafe-inline' blob: ${OBJECT_STORE_CSP_ORIGIN};";
    set $CSP "${CSP} img-src 'self' data: blob: ${OBJECT_STORE_CSP_ORIGIN};";
    set $CSP "${CSP} media-src 'self' data: ${OBJECT_STORE_CSP_ORIGIN};";
    set $CSP "${CSP} worker-src 'self' blob: ${OBJECT_STORE_CSP_ORIGIN};";
    set $CSP "${CSP} script-src 'self' 'unsafe-inline' https: http: 'unsafe-eval';"; # last 3 are needed by GeoGebra; http/https already covers the object store
    set $CSP "${CSP} style-src 'self' 'unsafe-inline' ${OBJECT_STORE_CSP_ORIGIN};";
    set $CSP "${CSP} font-src 'self' data: ${OBJECT_STORE_CSP_ORIGIN};";
    set $CSP "${CSP} connect-src 'self' data: https://api.github.com ${OBJECT_STORE_CSP_ORIGIN};";
    # upgrade-insecure-requests; can not be set because the textcenter must be usable via HTTP in local setups
    # block-all-mixed-content same
    add_header Content-Security-Policy $CSP;
  }

  error_page 500 502 503 504  /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
    internal;
  }

  # Healthcheck
  location /health {
    access_log off;
    add_header 'Content-Type' 'application/json';
    return 200 'healthy';
  }

  # Broadcaster
  location /bs/public/ {
    proxy_pass http://broadcaster:3000/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  # File Server
  location /fs/ {
    proxy_pass http://file-server:8080/;
  }

  # Backend
  location /api/ {
    client_max_body_size 2G;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_pass http://backend:8080/;
  }
}
