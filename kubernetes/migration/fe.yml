
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe-deployment
  namespace: tc
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: fe-pod
  template:
    metadata:
      labels:
        app: fe-pod
    spec:
      containers:
        - name: fe-container
          image: iqbberlin/testcenter-frontend:15.2.0
          ports:
            - name: http-container
              containerPort: 80 #interner port innerhalb von cluster
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
      volumes:
        - name: nginx-config-volume
          configMap:
            name: nginx-config-configmap
            items:
              - key: config.nginx.conf
                path: default.conf.template
---
apiVersion: v1
kind: Service
metadata:
  name: fe-service
  namespace: tc
spec:
  selector:
    app: fe-pod
  ports:
    - name: http-service
      port: 80 #interner port innerhalb von cluster
      targetPort: http-container
  type: NodePort
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config-configmap
  namespace: tc
data:
  config.nginx.conf: |
    error_log /dev/stdout;

    server {
      listen 80;
      listen [::]:80;
      server_name localhost;
      server_tokens off;

      access_log /dev/null;

      location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
      }

      location /index.html {
        root /usr/share/nginx/html;

        add_header Cache-Control no-store;
        expires 0;

        set $CSP "";
        set $CSP "${CSP} frame-ancestors 'none';";
        set $CSP "${CSP} frame-src 'self';";
        set $CSP "${CSP} default-src 'self' data:;";
        set $CSP "${CSP} child-src 'self' 'unsafe-inline';";
        set $CSP "${CSP} img-src 'self' data: blob:;";
        set $CSP "${CSP} media-src 'self' data:;";
        set $CSP "${CSP} script-src 'self' 'unsafe-inline' https: http: 'unsafe-eval';"; # last 3 are needed by GeoGebra
        set $CSP "${CSP} style-src 'self' 'unsafe-inline';";
        set $CSP "${CSP} font-src 'self' data:;";
        set $CSP "${CSP} connect-src 'self'";
        # upgrade-insecure-requests; can not be set because the textcenter must be usable via HTTP in local setups
        # block-all-mixed-content same
        add_header Content-Security-Policy $CSP;
      }

      error_page 500 502 503 504  /50x.html;
      location = /50x.html {
        root /usr/share/nginx/html;
        internal;
      }

      location /api {
        return 503 'Backend not available!';
      }

      location /fs {
        return 503 'File-Service not available!';
      }
    }

