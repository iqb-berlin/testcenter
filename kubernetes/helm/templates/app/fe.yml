apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.ingress.middleware.stripregex.fe }}
  namespace: {{ .Values.namespace }}
spec:
  redirectRegex:
    regex: ^http(s?)://www\.(.*)
    replacement: http${1}://${2}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-{{ .Values.frontend.name }}-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  {{- if .Values.frontend.strategy }}
  strategy:
    {{- .Values.frontend.strategy | toYaml | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-{{ .Values.frontend.name }}-pod
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-{{ .Values.frontend.name }}-pod
    spec:
      containers:
        - name: {{ .Chart.Name }}-{{ .Values.frontend.name }}-container
          image: iqbberlin/testcenter-frontend:{{ .Chart.Version }}
          ports:
            - name: http-container
              containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-{{ .Values.frontend.name }}-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Chart.Name }}-{{ .Values.frontend.name }}-pod
  ports:
    - name: http-service
      port: {{ .Values.frontend.port }}
      targetPort: http-container

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Chart.Name }}-{{ .Values.frontend.name }}-ingress
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`www.minikube-ip-defined-in-hosts.example`) || Host(`minikube-ip-defined-in-hosts.example`)
      kind: Rule
      middlewares:
        - name: {{ .Values.ingress.middleware.security.name }}
          namespace: {{ .Values.namespace }}
        - name: {{ .Values.ingress.middleware.stripregex.fe }}
          namespace: {{ .Values.namespace }}
      services:
        - name: {{ .Chart.Name }}-{{ .Values.frontend.name }}-service
          port: {{ .Values.frontend.port }}
#  tls:
#    certResolver: acme
#    options:
#      name: default
#      namespace: default