apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cache-service-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - {{ .Values.volume.cache.accessMode }}
  storageClassName: {{ .Values.volume.cache.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.volume.cache.size }}